name: Android CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: List files for debugging
        run: ls -laR

      - name: Grant execute permission and build
        working-directory: ./SelectTIme/android
        run: |
          ls -la  # Verify gradlew is here
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: SelectTIme/android/app/build/outputs/apk/debug/app-debug.apk